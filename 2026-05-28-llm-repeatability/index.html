<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Security Review Repeatability</title>
  <style>
    :root {
      /* Snyk Evo glow palette — source tokens */
      --snyk-purple: #9043c6;
      --snyk-glow-light-blue: #00bcffb3;
      --snyk-glow-pink: #ff0ff3b3;
      --snyk-glow-orange: #ff890499;
      --snyk-glow-pink-soft: #ff0ff399;
      --snyk-glow-red: #fb2c3680;
      --snyk-glow-orange-soft: #ff890480;

      /* Layout */
      --bg: #ffffff;
      --text: #111111;
      --muted: #5c5c5c;
      --grid: #e8e8e8;
      --axis: #000000;
      --surface: #fafafa;
      --surface-strong: #f4eef9;
      --radius: 6px;
      --font: ui-sans-serif, system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

      /* Chart role colors — change these to retheme.
         "model" = the AI agent (e.g. Claude Sonnet).
         "snyk"  = Snyk Code SAST. */
      --bar-model: #4a4a4a;
      --bar-snyk: var(--snyk-purple);

      /* Recall/precision pairs — model gets neutral grays, Snyk gets brand tones */
      --bar-model-recall: #4a4a4a;
      --bar-model-precision: #a0a0a0;
      --bar-snyk-recall: var(--snyk-purple);
      --bar-snyk-precision: #c39bdf;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 48px 32px 64px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    .page {
      max-width: 880px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 0;
    }

    .meta {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .report-toc {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid var(--grid);
      border-radius: 14px;
      background:
        linear-gradient(135deg, rgba(144, 67, 198, 0.08), rgba(0, 188, 255, 0.06)),
        var(--surface);
    }

    .toc-heading {
      margin: 0 0 12px;
      color: var(--snyk-purple);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .toc-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .toc-link,
    .rail-link {
      color: var(--text);
      text-decoration: none;
      transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .toc-link {
      display: block;
      min-height: 100%;
      padding: 9px 11px;
      border: 1px solid rgba(144, 67, 198, 0.16);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 0.84rem;
      font-weight: 650;
      line-height: 1.25;
    }

    .toc-link:hover,
    .toc-link:focus-visible,
    .toc-link.active {
      border-color: rgba(144, 67, 198, 0.48);
      background: rgba(144, 67, 198, 0.12);
      color: var(--snyk-purple);
      outline: none;
    }

    .section-rail {
      position: fixed;
      top: 108px;
      left: max(20px, calc((100vw - 1380px) / 2 + 20px));
      z-index: 10;
      width: 220px;
      max-height: calc(100vh - 136px);
      overflow: auto;
      padding: 14px;
      border: 1px solid var(--grid);
      border-radius: 16px;
      background: #ffffff;
    }

    .rail-title {
      margin-bottom: 10px;
      color: var(--snyk-purple);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .rail-list {
      display: grid;
      gap: 3px;
    }

    .rail-link {
      display: block;
      padding: 8px 10px 8px 12px;
      border-left: 3px solid transparent;
      border-radius: 0 8px 8px 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .rail-link:hover,
    .rail-link:focus-visible,
    .rail-link.active {
      border-left-color: var(--snyk-purple);
      background: var(--surface-strong);
      color: var(--snyk-purple);
      outline: none;
    }

    .task-group {
      position: relative;
      margin-bottom: 76px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--grid);
      scroll-margin-top: 32px;
    }

    .headline-group {
      position: relative;
      margin-bottom: 84px;
      padding-bottom: 44px;
      border-bottom: 2px solid var(--axis);
      scroll-margin-top: 32px;
    }

    .task-group:last-child {
      border-bottom: none;
    }

    .task-group h2.task-title,
    .headline-group h2.task-title {
      padding: 14px 18px 14px 22px;
      border-left: 5px solid var(--snyk-purple);
      border-radius: 12px;
      background:
        linear-gradient(90deg, rgba(144, 67, 198, 0.14), rgba(0, 188, 255, 0.07)),
        #ffffff;
      color: var(--snyk-purple);
      font-size: 1.55rem;
      font-weight: 800;
      line-height: 1.15;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    .task-group .task-subtitle,
    .headline-group .task-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin: 0 0 28px;
      padding-left: 27px;
    }

    section.chart-section {
      margin-bottom: 48px;
    }

    section.chart-section h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 4px;
      letter-spacing: -0.01em;
    }

    section.chart-section .chart-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0 0 16px;
    }

    .chart-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .chart-wrap svg {
      display: block;
      min-width: 520px;
    }

    .y-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      fill: var(--muted);
    }

    .grid line {
      stroke: var(--grid);
      stroke-width: 1;
    }

    .axis-x {
      stroke: var(--axis);
      stroke-width: 1.5;
    }

    .tick-label {
      font-size: 12px;
      fill: var(--text);
    }

    .value-label {
      font-size: 13px;
      font-weight: 700;
      fill: var(--text);
    }

    .error-bar {
      stroke: var(--axis);
      stroke-width: 1.5;
      stroke-linecap: round;
    }

    .footnote {
      font-size: 0.75rem;
      font-style: italic;
      fill: var(--muted);
    }

    .scatter-legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px 18px;
      margin-top: 14px;
      font-size: 0.76rem;
      color: var(--muted);
    }

    .scatter-legend-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .scatter-legend-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      color: #ffffff;
      font-size: 0.68rem;
      font-weight: 700;
    }

    .scatter-legend-label {
      color: var(--text);
      font-weight: 600;
    }

    footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--grid);
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 1280px) {
      .section-rail {
        display: none;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 32px 18px 48px;
      }

      .task-group h2.task-title,
      .headline-group h2.task-title {
        font-size: 1.32rem;
      }

      .task-group .task-subtitle,
      .headline-group .task-subtitle {
        padding-left: 0;
      }
    }
  </style>
</head>

    function ns(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) {
        for (const [k, v] of Object.entries(attrs)) {
          if (v !== undefined && v !== null) el.setAttribute(k, String(v));
        }
      }
      if (children) {
        for (const c of children) {

    function topRoundedRect(x, y, w, h, r) {
      if (h <= 0) return `M${x},${y + h}h${w}v0h${-w}z`;
      const clampR = Math.min(r, w / 2, h);
      return [
        `M${x},${y + h}`,
        `V${y + clampR}`,
        `Q${x},${y} ${x + clampR},${y}`,
        `H${x + w - clampR}`,
        `Q${x + w},${y} ${x + w},${y + clampR}`,
        `V${y + h}`,
        `Z`,
      ].join("");

    function isFiniteNumber(x) {

    }

    function pctWithStdDev(value, stdDev, repetitions) {
      if (!isFiniteNumber(value)) return "N/A";
      if (!isFiniteNumber(stdDev) || repetitions <= 1) return pct(value);
      return `${(100 * value).toFixed(1)}% ± ${(100 * stdDev).toFixed(1)}pp`;
    }

    function fmtMs(ms) {
      if (!isFiniteNumber(ms)) return "N/A";
      if (ms >= 1000) return (ms / 1000).toFixed(1) + " s";
      if (ms >= 100) return Math.round(ms) + " ms";
      if (ms >= 10) return ms.toFixed(1) + " ms";
      return ms.toFixed(2) + " ms";
    }

    function fmtMsWithStdDev(ms, stdDevMs, repetitions) {
      if (!isFiniteNumber(ms)) return "N/A";
      if (!isFiniteNumber(stdDevMs) || repetitions <= 1) return fmtMs(ms);
      return `${fmtMs(ms)} ± ${fmtMs(stdDevMs)}`;

    function wrapLabel(label, maxChars = 14, maxLines = 3) {
      const words = String(label || "").split(/\s+/).filter(Boolean);
      const lines = [];
      let current = "";
      for (const word of words) {
        const next = current ? current + " " + word : word;
        if (next.length <= maxChars || !current) {
          current = next;
        } else {
          lines.push(current);
          current = word;
        }
        if (lines.length === maxLines - 1) break;
      }
      const usedWords = lines.join(" ").split(/\s+/).filter(Boolean).length + (current ? current.split(/\s+/).length : 0);
      if (current) lines.push(current);
      if (usedWords < words.length && lines.length > 0) {
        const last = lines[lines.length - 1];
        lines[lines.length - 1] = last.length > maxChars - 3 ? last.slice(0, maxChars - 3) + "..." : last + "...";

      return lines.slice(0, maxLines);

        const upper = Math.min(yMax, v + err);

      const section = document.createElement("section");
      section.className = "chart-section";
      section.innerHTML = `<h3>${config.heading}</h3><p class="chart-desc">${config.description}</p><div class="chart-wrap"></div>`;
      group.appendChild(section);
      renderScatterChart(section.querySelector(".chart-wrap"), config);
    }

    function renderComparisonGroup(container, options) {
      const { title, subtitle, rows, headline } = options;
      const group = document.createElement("div");
      group.className = headline ? "headline-group" : "task-group";

      const titleEl = document.createElement("h2");
      titleEl.className = "task-title";
      titleEl.textContent = title;
      group.appendChild(titleEl);

      const subtitleEl = document.createElement("p");
      subtitleEl.className = "task-subtitle";
      subtitleEl.textContent = subtitle;
      group.appendChild(subtitleEl);

      const runs = normalizeAggregateRows(rows);

      renderMetricSection(group, runs, {
        heading: headline ? "Headline score" : "Composite score",
        description: headline
          ? "Macro-averaged benchmark score across all fixtures (higher is better). Error bars show sample standard deviation across repetition-level headline scores."
          : "Aggregated benchmark score for this task across repetitions (higher is better). Error bars show sample standard deviation across repeated runs.",
        title: "Score - " + title,
        yAxisLabel: "SCORE",
        value: (r) => r.score,
        errorValue: (r) => r.scoreStdDev,
        valueFormat: (value, i) => pctWithStdDev(value, runs[i].scoreStdDev, runs[i].repetitions),
        yMax: 1,
        yTicks: [0, 0.2, 0.4, 0.6, 0.8, 1],
        yTickFormat: (t) => Math.round(t * 100) + "%",
      });

      const maxDur = Math.max(
        ...runs.map((r) => r.durationMs + (isFiniteNumber(r.durationStdDevMs) ? r.durationStdDevMs : 0)),
        1
      );
      const yMaxMs = Math.ceil(maxDur / 5000) * 5000;
      renderMetricSection(group, runs, {
        heading: "Session duration",
        description: headline
          ? "Macro-averaged wall-clock time from start to completion. Error bars show sample standard deviation across repetition-level headline runtimes."
          : "Mean wall-clock time across repetitions for this task. Error bars show sample standard deviation across repeated runs.",
        title: "Duration - " + title,
        yAxisLabel: "DURATION",
        value: (r) => r.durationMs,
        errorValue: (r) => r.durationStdDevMs,
        valueFormat: (value, i) => fmtMsWithStdDev(value, runs[i].durationStdDevMs, runs[i].repetitions),
        yMax: yMaxMs,
        yTicks: yTicks(yMaxMs),
        yTickFormat: (t) => (t >= 1000 ? Math.round(t / 1000) + "s" : String(Math.round(t))),
      });

      const yMaxTokens = niceMax(runs.map((r) => r.totalTokens), 25000);
      renderMetricSection(group, runs, {
        heading: "Total tokens",
        description: headline
          ? "Macro-averaged total tokens per config. Command-based runs are zero-token by design."
          : "Mean total tokens across repetitions. Command-based runs are zero-token by design.",
        title: "Total tokens - " + title,
        yAxisLabel: "TOKENS",
        value: (r) => r.totalTokens,
        valueFormat: fmtTokens,
        yMax: yMaxTokens,
        yTicks: yTicks(yMaxTokens),
        yTickFormat: fmtTokens,
      });

      const costValues = runs.map((r) => r.totalCostUsd).filter(isFiniteNumber);
      if (costValues.length > 0) {
        const yMaxCost = Math.max(0.01, Math.ceil(Math.max(...costValues) * 100) / 100);
        renderMetricSection(group, runs, {
          heading: "Estimated cost",
          description: headline
            ? "Macro-averaged session cost in USD. Command-based runs report N/A."
            : "Mean session cost in USD across repetitions. Command-based runs report N/A.",
          title: "Cost - " + title,
          yAxisLabel: "COST",
          value: (r) => r.totalCostUsd,
          valueFormat: fmtCost,
          yMax: yMaxCost,
          yTicks: yTicks(yMaxCost),
          yTickFormat: fmtCost,
        });
      }

      const hasRecallPrecision = runs.some((r) => r.recall != null && r.precision != null);
      if (hasRecallPrecision) {
        const rpSection = document.createElement("section");
        rpSection.className = "chart-section";
        rpSection.innerHTML = `<h3>Recall and precision</h3><p class="chart-desc">Recall (known vulns found) and precision (share of findings that matched ground truth).</p><div class="chart-wrap"></div>`;
        group.appendChild(rpSection);

        const recallPrecisionColors = runs.map((r) =>
          r.isSnyk
            ? { recall: COLORS.snykRecall, precision: COLORS.snykPrecision }
            : { recall: COLORS.modelRecall, precision: COLORS.modelPrecision }
        );
        renderGroupedRecallPrecision(
          rpSection.querySelector(".chart-wrap"),
          runs.map((r) => r.label),
          runs.map((r) => r.recall || 0),
          runs.map((r) => r.precision || 0),
          recallPrecisionColors
        );
      }

      if (headline) {
        const costPoints = runs.filter((r) => !r.isSnyk && isFiniteNumber(r.totalCostUsd) && isFiniteNumber(r.score));
        renderScatterSection(group, {
          heading: "Score vs estimated cost",
          description: "Supplementary tradeoff view for model configs with known cost. Better points move toward the top-left: higher score at lower cost.",
          title: "Score vs estimated cost - " + title,
          points: costPoints,
          xValue: (r) => r.totalCostUsd,
          yValue: (r) => r.score,
          xAxisLabel: "COST",
          yAxisLabel: "SCORE",
          xFormat: fmtCost,
          yFormat: pct,
          xRange: valueRange(costPoints.map((r) => r.totalCostUsd)),
          yRange: { min: 0, max: 1 },
          yTicks: [0, 0.2, 0.4, 0.6, 0.8, 1],
        });

        const durationPoints = runs.filter((r) => isFiniteNumber(r.durationMs) && isFiniteNumber(r.score));
        renderScatterSection(group, {
          heading: "Score vs session duration",
          description: "Supplementary speed/quality view across all configs. Better points move toward the top-left: higher score in less wall-clock time.",
          title: "Score vs session duration - " + title,
          points: durationPoints,
          xValue: (r) => r.durationMs,
          yValue: (r) => r.score,
          xAxisLabel: "DURATION",
          yAxisLabel: "SCORE",
          xFormat: fmtMs,
          yFormat: pct,
          xRange: valueRange(durationPoints.map((r) => r.durationMs)),
          yRange: { min: 0, max: 1 },
          yTicks: [0, 0.2, 0.4, 0.6, 0.8, 1],
        });

        const recallPrecisionPoints = runs.filter((r) => isFiniteNumber(r.recall) && isFiniteNumber(r.precision));
        renderScatterSection(group, {
          heading: "Recall vs precision",
          description: "Supplementary find-vulns view. Better points move toward the top-right: more known vulnerabilities found with fewer false positives.",
          title: "Recall vs precision - " + title,
          points: recallPrecisionPoints,
          xValue: (r) => r.precision,
          yValue: (r) => r.recall,
          xAxisLabel: "PRECISION",
          yAxisLabel: "RECALL",
          xFormat: pct,
          yFormat: pct,
          xRange: { min: 0, max: 1 },
          yRange: { min: 0, max: 1 },
          yTicks: [0, 0.2, 0.4, 0.6, 0.8, 1],
        });
      }

      container.appendChild(group);
    }

    function safeId(id) {
      return String(id || "chart").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    }

    function chartAnchor(spec) {
      return "chart-" + safeId(spec.id);
    }

    function sectionAnchor(section) {
      return "section-" + safeId((section && (section.id || section.title)) || "charts");
    }

    function setActiveSection(sectionId) {
      document.querySelectorAll("[data-section-target]").forEach((link) => {
        const active = link.dataset.sectionTarget === sectionId;
        link.classList.toggle("active", active);
        if (active) {
          link.setAttribute("aria-current", "location");
        } else {
          link.removeAttribute("aria-current");
        }
      });
    }

    function buildSectionNavigation(sectionGroups) {
      const navItems = sectionGroups.map(({ section }) => ({
        id: sectionAnchor(section),
        title: section.title || "Charts",
        subtitle: section.subtitle || "",
      }));

      if (navItems.length === 0) return;

      const toc = document.getElementById("report-toc");
      const tocList = document.getElementById("report-toc-list");
      const rail = document.getElementById("section-rail");
      const railList = document.getElementById("section-rail-list");

      tocList.innerHTML = "";
      railList.innerHTML = "";

      for (const item of navItems) {
        const tocItem = document.createElement("li");
        const tocLink = document.createElement("a");
        tocLink.className = "toc-link";
        tocLink.href = "#" + item.id;
        tocLink.textContent = item.title;
        tocLink.title = item.subtitle ? `${item.title} - ${item.subtitle}` : item.title;
        tocLink.dataset.sectionTarget = item.id;
        tocItem.appendChild(tocLink);
        tocList.appendChild(tocItem);

        const railLink = document.createElement("a");
        railLink.className = "rail-link";
        railLink.href = "#" + item.id;
        railLink.textContent = item.title;
        railLink.title = item.subtitle ? `${item.title} - ${item.subtitle}` : item.title;
        railLink.dataset.sectionTarget = item.id;
        railList.appendChild(railLink);
      }

      toc.hidden = false;
      rail.hidden = false;
      setActiveSection(navItems[0].id);
    }

    function setupSectionSpy(sectionIds) {
      const sections = sectionIds.map((id) => document.getElementById(id)).filter(Boolean);
      if (sections.length === 0) return;

      let ticking = false;
      const updateActive = () => {
        const marker = Math.min(180, window.innerHeight * 0.28);
        let current = sections[0].id;

        for (const section of sections) {
          if (section.getBoundingClientRect().top <= marker) {
            current = section.id;
          } else {
            break;
          }
        }

        setActiveSection(current);
        ticking = false;
      };

      const requestUpdate = () => {
        if (!ticking) {
          ticking = true;
          window.requestAnimationFrame(updateActive);
        }
      };

      document.addEventListener("scroll", requestUpdate, { passive: true });
      window.addEventListener("resize", requestUpdate);
      updateActive();
    }

    function specRows(spec) {
      return (spec.dataSummary && spec.dataSummary.rows) || spec.rows || [];
    }

    function specGroups(spec) {
      return (spec.dataSummary && spec.dataSummary.groups) || spec.groups || [];
    }

    function specPoints(spec) {
      return (spec.dataSummary && spec.dataSummary.points) || spec.points || [];
    }

    function colorForRunConfigType(type) {
      return type === "command" || type === "snyk" ? COLORS.snyk : COLORS.model;
    }

    function colorPairForRunConfigType(type) {
      return type === "command" || type === "snyk"
        ? { recall: COLORS.snykRecall, precision: COLORS.snykPrecision }
        : { recall: COLORS.modelRecall, precision: COLORS.modelPrecision };
    }

    function unitFor(spec, axis) {
      const key = axis ? axis + "Unit" : "unit";
      return spec[key] || (spec.dataSummary && spec.dataSummary[key]) || (spec.dataSummary && spec.dataSummary.unit) || "number";
    }

    function formatSpecValue(unit, value, stdDev, repetitions) {
      if (unit === "percent") return pctWithStdDev(value, stdDev, repetitions || 1);
      if (unit === "milliseconds") return fmtMsWithStdDev(value, stdDev, repetitions || 1);
      if (unit === "tokens") return fmtTokens(value);
      if (unit === "usd") return fmtCost(value);
      if (!isFiniteNumber(value)) return "N/A";
      return String(Number.isInteger(value) ? value : Number(value).toFixed(2));
    }

    function formatSpecAxis(unit, value) {
      if (unit === "percent") return pct(value);
      if (unit === "milliseconds") return fmtMs(value);
      if (unit === "tokens") return fmtTokens(value);
      if (unit === "usd") return fmtCost(value);
      if (!isFiniteNumber(value)) return "N/A";
      return String(Number.isInteger(value) ? value : Number(value).toFixed(2));
    }

    function defaultYMax(unit, values, errors) {
      const adjustedValues = values.map((value, i) => {
        const safeValue = isFiniteNumber(value) ? value : 0;
        const safeError = isFiniteNumber(errors[i]) ? Math.max(0, errors[i]) : 0;
        return safeValue + safeError;
      });
      const maxAdjusted = Math.max(...adjustedValues, 0);
      if (unit === "percent") return Math.max(1, Math.min(1.25, maxAdjusted * 1.16));
      if (unit === "milliseconds") return niceMax(adjustedValues.map((value) => value * 1.16), 5000);
      if (unit === "tokens") return niceMax(adjustedValues.map((value) => value * 1.16), 25000);
      if (unit === "usd") return Math.max(0.01, Math.ceil(maxAdjusted * 1.16 * 100) / 100);
      return Math.max(1, Math.max(...adjustedValues, 0) * 1.15);
    }

    function defaultTicks(unit, max) {
      if (unit === "percent") return [0, 0.2, 0.4, 0.6, 0.8, 1];
      return yTicks(max);
    }

    function makeChartSection(group, spec) {
      const section = document.createElement("section");
      section.className = "chart-section";
      section.id = chartAnchor(spec);
      section.dataset.chartId = spec.id;

      const titleEl = document.createElement("h3");
      titleEl.textContent = spec.title || spec.heading || spec.id;
      section.appendChild(titleEl);

      const descEl = document.createElement("p");
      descEl.className = "chart-desc";
      descEl.textContent = spec.description || spec.caption || "";
      section.appendChild(descEl);

      const wrap = document.createElement("div");
      wrap.className = "chart-wrap";
      section.appendChild(wrap);
      group.appendChild(section);
      return wrap;
    }

    function renderSpecBar(group, spec) {
      const rows = specRows(spec);
      if (rows.length === 0) return;
      const unit = unitFor(spec);
      const values = rows.map((row) => row.value);
      const errors = rows.map((row) => row.stdDev || row.error || 0);
      const yMax = spec.yMax || defaultYMax(unit, values, errors);
      const wrap = makeChartSection(group, spec);
      renderBarChart(wrap, {
        title: spec.title || spec.id,
        yAxisLabel: spec.yAxisLabel || String(spec.metric || unit).toUpperCase(),
        categories: rows.map((row) => row.label),
        values,
        valueFormat: (value, i) => formatSpecValue(unit, value, errors[i], rows[i] && rows[i].repetitions),
        yMax,
        yTicks: spec.yTicks || defaultTicks(unit, yMax),
        yTickFormat: (tick) => formatSpecAxis(unit, tick),
        barColors: rows.map((row) => colorForRunConfigType(row.runConfigType || row.configType || row.role)),
        errorValues: errors,
      });
    }

    function renderSpecGroupedBar(group, spec) {
      const groups = specGroups(spec);
      if (groups.length === 0) return;
      const wrap = makeChartSection(group, spec);
      renderGroupedRecallPrecision(
        wrap,
        groups.map((item) => item.label),
        groups.map((item) => item.recall),
        groups.map((item) => item.precision),
        groups.map((item) => colorPairForRunConfigType(item.runConfigType || item.configType || item.role))
      );
    }

    function renderSpecScatter(group, spec) {
      const points = specPoints(spec).map((point) => ({
        ...point,
        barMain: colorForRunConfigType(point.runConfigType || point.configType || point.role),
      }));
      if (points.length < 2) return;
      const xUnit = unitFor(spec, "x");
      const yUnit = unitFor(spec, "y");
      const yRange = spec.yRange || (yUnit === "percent" ? { min: 0, max: 1.08 } : valueRange(points.map((point) => point.y)));
      const wrap = makeChartSection(group, spec);
      renderScatterChart(wrap, {
        title: spec.title || spec.id,
        points,
        xValue: (point) => point.x,
        yValue: (point) => point.y,
        xAxisLabel: spec.xAxisLabel || "X",
        yAxisLabel: spec.yAxisLabel || "Y",
        xFormat: (value) => formatSpecAxis(xUnit, value),
        yFormat: (value) => formatSpecAxis(yUnit, value),
        xRange: spec.xRange || valueRange(points.map((point) => point.x)),
        yRange,
        yTicks: spec.yTicks || defaultTicks(yUnit, yRange.max),
      });
    }

    function renderSpecLabeledScatter(group, spec) {
      const points = specPoints(spec).map((point) => ({
        ...point,
        barMain: colorForRunConfigType(point.runConfigType || point.configType || point.role),
      }));
      if (points.length < 2) return;

      const xUnit = unitFor(spec, "x");
      const yUnit = unitFor(spec, "y");
      const xRange = spec.xRange || valueRange(points.map((point) => point.x));
      const yRange = spec.yRange || (yUnit === "percent" ? { min: 0, max: 1.08 } : valueRange(points.map((point) => point.y)));
      const xTicks = spec.xTicks || [0, 0.01, 0.02, 0.03, 0.04];
      const yTicks = spec.yTicks || defaultTicks(yUnit, yRange.max);
      const wrap = makeChartSection(group, spec);

      const W = 860;
      const H = 360;
      const margin = { top: 42, right: 42, bottom: 70, left: 86 };
      const innerW = W - margin.left - margin.right;
      const innerH = H - margin.top - margin.bottom;
      const xScale = (value) => ((value - xRange.min) / (xRange.max - xRange.min)) * innerW;
      const yScale = (value) => innerH - ((value - yRange.min) / (yRange.max - yRange.min)) * innerH;
      const svg = ns("svg", {
        viewBox: `0 0 ${W} ${H}`,
        width: W,
        height: H,
        role: "img",
        "aria-label": spec.title || spec.id,
      });
      const gRoot = ns("g", { transform: `translate(${margin.left},${margin.top})` });
      svg.appendChild(gRoot);

      for (const t of xTicks) {
        const x = xScale(t);
        gRoot.appendChild(ns("line", { class: "grid", x1: x, x2: x, y1: 0, y2: innerH }));
        gRoot.appendChild(ns("text", { class: "tick-label", x, y: innerH + 22, "text-anchor": "middle", "font-size": "11", fill: "#5c5c5c" }, [formatSpecAxis(xUnit, t)]));
      }

      for (const t of yTicks) {
        const y = yScale(t);
        gRoot.appendChild(ns("line", { class: "grid", x1: 0, x2: innerW, y1: y, y2: y }));
        gRoot.appendChild(ns("text", { class: "tick-label", x: -14, y: y + 4, "text-anchor": "end", "font-size": "11", fill: "#5c5c5c" }, [formatSpecAxis(yUnit, t)]));
      }

      gRoot.appendChild(ns("line", { class: "axis-x", x1: 0, x2: innerW, y1: innerH, y2: innerH }));
      gRoot.appendChild(ns("line", { class: "axis-x", x1: 0, x2: 0, y1: 0, y2: innerH }));
      gRoot.appendChild(ns("text", { class: "y-label", x: -innerH / 2, y: -66, transform: "rotate(-90)", "text-anchor": "middle" }, [spec.yAxisLabel || "Y"]));
      gRoot.appendChild(ns("text", { class: "y-label", x: innerW / 2, y: innerH + 52, "text-anchor": "middle" }, [spec.xAxisLabel || "X"]));

      points.forEach((point) => {
        const x = xScale(point.x);
        const y = yScale(point.y);
        const isCommand = (point.runConfigType || point.configType || point.role) === "command";
        const r = isCommand ? 10 : 7;
        gRoot.appendChild(ns("circle", {
          cx: x,
          cy: y,
          r,
          fill: point.barMain,
          stroke: isCommand ? "#5f237f" : "#111111",
          "stroke-width": isCommand ? 2 : 1,
        }));
        gRoot.appendChild(ns("text", {
          x: x + (point.labelDx ?? 10),
          y: y + (point.labelDy ?? -10),
          "text-anchor": point.labelAnchor || "start",
          "font-size": isCommand ? "12" : "11",
          "font-weight": isCommand ? "800" : "700",
          fill: isCommand ? COLORS.snyk : "#111111",
        }, [point.shortLabel || point.label]));
        gRoot.appendChild(ns("text", {
          x: x + (point.labelDx ?? 10),
          y: y + (point.labelDy ?? -10) + 14,
          "text-anchor": point.labelAnchor || "start",
          "font-size": "10",
          fill: "#5c5c5c",
        }, [`${formatSpecAxis(yUnit, point.y)} / ${formatSpecAxis(xUnit, point.x)} sd`]));
      });

      wrap.innerHTML = "";
      wrap.appendChild(svg);
    }

    function renderSpecChart(group, spec) {
      if (spec.chartType === "bar") {
        renderSpecBar(group, spec);
      } else if (spec.chartType === "grouped-bar") {
        renderSpecGroupedBar(group, spec);
      } else if (spec.chartType === "scatter") {
        renderSpecScatter(group, spec);
      } else if (spec.chartType === "labeled-scatter") {
        renderSpecLabeledScatter(group, spec);
      } else {
        const wrap = makeChartSection(group, spec);
        const note = document.createElement("p");
        note.className = "chart-desc";
        note.textContent = `Custom chart type "${spec.chartType}" is described in chart-manifest.json but is not rendered by this template.`;
        wrap.appendChild(note);
      }
    }

    function groupChartSpecs(specs) {
      const groups = [];
      const byId = new Map();
      for (const spec of specs) {
        const section = spec.section || { id: "charts", title: "Charts", subtitle: "" };
        const id = section.id || "charts";
        if (!byId.has(id)) {
          const entry = { section, specs: [] };
          byId.set(id, entry);
          groups.push(entry);
        }
        byId.get(id).specs.push(spec);
      }
      return groups;
    }

    function init() {
      const specs = CHART_SPECS.filter((spec) => spec && spec.id);
      document.getElementById("report-meta").textContent = `Charts embedded: ${specs.length}`;

      const root = document.getElementById("charts-root");
      const sectionGroups = groupChartSpecs(specs);
      buildSectionNavigation(sectionGroups);

      for (const { section, specs: sectionSpecs } of sectionGroups) {
        const group = document.createElement("div");
        group.className = section.kind === "headline" ? "headline-group" : "task-group";
        group.id = sectionAnchor(section);

        const titleEl = document.createElement("h2");
        titleEl.className = "task-title";
        titleEl.id = group.id + "-title";
        titleEl.textContent = section.title || "Charts";
        group.appendChild(titleEl);
        group.setAttribute("aria-labelledby", titleEl.id);

        const subtitleEl = document.createElement("p");
        subtitleEl.className = "task-subtitle";
        subtitleEl.textContent = section.subtitle || "";
        group.appendChild(subtitleEl);

        for (const spec of sectionSpecs) {
          renderSpecChart(group, spec);
        }

        root.appendChild(group);
      }

      setupSectionSpy(sectionGroups.map(({ section }) => sectionAnchor(section)));
    }

    init();
  </script>
</body>
</html>
